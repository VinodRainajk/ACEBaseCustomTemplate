# Test Configuration - Central Profile Management
# This file sets the default database profile for all tests

# Default Database Profile
# Change this value to switch between different databases/environments
db.profile=mysql-world

# Available profiles (uncomment the one you want to use):
# db.profile=mysql
# db.profile=mysql-dev
# db.profile=mysql-test
# db.profile=mysql-staging
# db.profile=postgresql
# db.profile=sqlserver
# db.profile=oracle
# db.profile=oracle-schema1
# db.profile=oracle-schema2
# db.profile=oracle-schema3

# Profile Location
# All profile configuration files are in: src/test/resources/config/
# Example: mysql-world-config.properties, oracle-schema1-config.properties

# Override from Command Line
# You can override this value when running tests:
# mvn test -Ddb.profile=postgresql
# mvn test -Ddb.profile=oracle-schema2

# Override from IntelliJ
# Edit Run Configuration → VM Options: -Ddb.profile=mysql-world
