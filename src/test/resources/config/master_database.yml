# master_database.yml - Base database configurations (Level 1)
# Referenced in steps: I connect to database "mysql-world"

mysql:
  type: mysql
  url: jdbc:mysql://localhost:3306/testdb
  username: root
  password: password
  driver: com.mysql.cj.jdbc.Driver
  timeout: 30000

mysql-world:
  type: mysql
  url: jdbc:mysql://localhost:3306/world
  username: dev
  password: admin
  driver: com.mysql.cj.jdbc.Driver
  timeout: 30000

postgresql:
  type: postgresql
  url: jdbc:postgresql://localhost:5432/testdb
  username: testuser
  password: testpass
  driver: org.postgresql.Driver
  timeout: 30000

oracle:
  type: oracle
  url: jdbc:oracle:thin:@localhost:1521:xe
  username: system
  password: oracle
  driver: oracle.jdbc.OracleDriver
  timeout: 30000
