# MySQL Staging Environment Configuration

db.type=mysql
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://staging-server:3306/staging_database
db.host=staging-server
db.port=3306
db.database=staging_database
db.username=staging_user
db.password=staging_password
db.connection.timeout=30000
db.connection.pool.size=10
db.ssl.enabled=true

# MySQL specific properties
db.mysql.useSSL=true
db.mysql.serverTimezone=UTC
db.mysql.allowPublicKeyRetrieval=false

# Environment metadata
db.environment=staging
