# MySQL Development Environment Configuration

db.type=mysql
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/dev
db.host=localhost
db.port=3306
db.database=world
db.username=dev
db.password=admin
db.connection.timeout=30000
db.connection.pool.size=10
db.ssl.enabled=false

# MySQL specific properties
db.mysql.useSSL=false
db.mysql.serverTimezone=UTC
db.mysql.allowPublicKeyRetrieval=true

# Environment metadata
db.environment=development
